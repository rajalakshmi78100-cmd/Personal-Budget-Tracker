<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings</title>

    <link href="../src/output.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body class="bg-gray-100">


    <div class="flex min-h-screen">


        <!-- ================= Sidebar ================= -->

        <aside id="sidebar" class="fixed top-0 left-0 h-screen w-64 bg-white shadow-lg
-transform -translate-x-full
transition-transform duration-300
z-50 lg:translate-x-0
flex flex-col justify-between">

            <!-- Top -->
            <div class="flex justify-end lg:hidden p-4">

                <button id="close-btn" class="text-2xl text-gray-700">
                    <i class="fa-solid fa-xmark"></i>
                </button>

            </div>
            <div>

                <!-- Logo -->

                <div class="flex items-center gap-4 px-6 py-6">

                    <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center text-white text-xl">

                        <i class="fa-solid fa-wallet"></i>

                    </div>

                    <div>

                        <h1 class="font-bold text-lg">
                            Budget
                        </h1>

                        <h1 class="font-bold text-lg">
                            Tracker
                        </h1>

                    </div>

                </div>

                <!-- Navigation -->

                <nav class="mt-5 space-y-2">

                    <a href="dashboard.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-house"></i>
                        Dashboard

                    </a>

                    <a href="add-expense.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-circle-minus"></i>
                        Add Expense

                    </a>

                    <a href="add-income.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-square-plus"></i>
                        Add Income

                    </a>

                    <a href="transaction.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-file-lines"></i>
                        Transactions

                    </a>

                    <a href="reports.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-chart-column"></i>
                        Reports

                    </a>

                    <a href="categories.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-layer-group"></i>
                        Categories

                    </a>

                    <a href="savings.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-piggy-bank"></i>
                        Savings

                    </a>

                    <a href="settings.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-gear"></i>
                        Settings

                    </a>

                    <a href="about.html"
                        class="menu-item flex items-center gap-4 mx-4 px-5 py-3 rounded-xl hover:bg-purple-100 hover:text-purple-700 transition duration-300">

                        <i class="fa-solid fa-circle-info"></i>
                        About

                    </a>

                </nav>
            </div>

            <!-- Bottom Card -->

            <div class="m-5 bg-purple-50 rounded-3xl p-6">

                <div class="flex justify-center">

                    <div
                        class="w-20 h-20 rounded-full bg-purple-600 flex items-center justify-center text-white text-3xl">

                        <i class="fa-solid fa-shield-halved"></i>

                    </div>

                </div>

                <h2 class="font-semibold text-center mt-5">

                    Your data is safe

                </h2>

                <p class="text-center text-gray-500 text-sm mt-3 leading-6">

                    We value your privacy and keep your financial data secure.

                </p>

            </div>

        </aside>
        <div id="overlay" class="fixed inset-0 bg-black/40 hidden z-40 lg:hidden">
        </div>


        <!-- ================= Main Content ================= -->


        <main class="flex-1 lg:ml-64 p-4 md:p-6 lg:p-8 bg-gray-100">


            <!-- Header -->
            <div class="flex items-center justify-between mb-8">

                <!-- Left Side -->
                <div class="flex items-center gap-4">

                    <!-- Mobile Menu -->
                    <button id="menu-btn" class="lg:hidden text-purple-600 text-3xl">

                        <i class="fa-solid fa-bars"></i>

                    </button>

                    <div>

                        <h1 class="text-3xl font-bold">
                            Savings
                        </h1>

                        <p class="text-gray-500">
                            Manage your savings goals
                        </p>

                    </div>

                </div>

                <!-- Right Side -->
                <div class="flex items-center gap-4 ml-auto">

                    <!-- Month -->
                    <select class="border border-gray-300 rounded-2xl px-4 py-3 bg-white shadow-md font-medium">

                        <option>This Month</option>
                        <option>Last Month</option>
                        <option>This Year</option>

                    </select>

                    <!-- Notification -->
<div class="relative">

    <button id="notificationBtn"
        class="relative w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center">

        <i class="fa-solid fa-bell text-gray-600"></i>

        <span id="notificationDot"
            class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white">
        </span>

    </button>

    <!-- Notification Popup -->
    <div id="notificationBox"
        class="hidden absolute right-0 mt-3 w-72 bg-white rounded-2xl shadow-xl border z-50">

        <div class="p-4 border-b font-semibold">
            Notifications
        </div>

        <div id="notificationContent"
            class="p-4 text-gray-500">

            No new notifications

        </div>

    </div>

</div>
                    <!-- Profile -->
                    <div
                        class="w-12 h-12 rounded-full bg-purple-600 text-white flex items-center justify-center font-semibold">

                        S

                    </div>

                </div>

            </div> 
            <!-- Add Savings Form -->


            <div class="bg-white rounded-3xl shadow-sm border p-8">


                <div class="flex items-center gap-3 mb-8">


                    <div class="w-12 h-12 rounded-full bg-purple-100 
                flex items-center justify-center">

                        <i class="fa-solid fa-piggy-bank text-purple-600"></i>

                    </div>


                    <h2 class="text-2xl font-bold">

                        Add Saving Goal

                    </h2>


                </div>





                <form id="savingForm" class="space-y-6">


                    <div>

                        <label class="font-semibold block mb-2">
                            Saving Name
                        </label>

                        <input type="text" id="savingName" placeholder="Emergency Fund"
                            class="w-full border rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                            required>

                    </div>




                    <div>

                        <label class="font-semibold block mb-2">
                            Target Amount
                        </label>

                        <input type="number" id="targetAmount"
                            class="w-full border rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                            required>

                    </div>




                    <div>

                        <label class="font-semibold block mb-2">
                            Saved Amount
                        </label>

                        <input type="number" id="savedAmount"
                            class="w-full border rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-purple-500"
                            required>

                    </div>




                    <button class="w-full bg-purple-600 hover:bg-purple-700 
                text-white py-4 rounded-xl font-semibold text-lg transition">

                        Add Saving

                    </button>


                </form>


            </div>





            <!-- Saved List -->


            <div id="savingList" class="mt-8 space-y-4"></div>



        </main>



    </div>



    <script src="../js/savings.js"></script>


</body>

</html>
