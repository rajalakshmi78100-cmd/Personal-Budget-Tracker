<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Login</title>

    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-purple-50 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-[400px]">

        <div class="text-center">

            <div class="w-20 h-20 bg-purple-600 rounded-full mx-auto flex items-center justify-center text-white text-3xl">
                <i class="fa-solid fa-wallet"></i>
            </div>

            <h1 class="text-3xl font-bold mt-4">Budget Tracker</h1>
            <p class="text-gray-500 mt-2">Manage your finances easily</p>

        </div>

        <form id="loginForm" class="mt-8 space-y-5">

            <div>
                <label class="font-medium">Username</label>
                <input
                    type="text"
                    id="username"
                    placeholder="Enter username"
                    class="w-full border rounded-lg px-4 py-3 mt-2 outline-none focus:ring-2 focus:ring-purple-600">
                <p id="userError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div>
                <label class="font-medium">Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    class="w-full border rounded-lg px-4 py-3 mt-2 outline-none focus:ring-2 focus:ring-purple-600">
                <p id="emailError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <div>
                <label class="font-medium">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    class="w-full border rounded-lg px-4 py-3 mt-2 outline-none focus:ring-2 focus:ring-purple-600">
                <p id="passwordError" class="text-red-500 text-sm mt-1"></p>
            </div>

            <button
                type="submit"
                class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700">
                Login
            </button>

        </form>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
